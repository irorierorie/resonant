# ─── Resonant — configuration ─────────────────────────────────────────────────
# Copy this file to `resonant.yaml` (gitignored) and edit. The loader searches
# for ./resonant.yaml, then ./resonant.yml, then ./config/resonant.yaml.
#
# Every key below has a built-in default, so a minimal file works — this template
# just shows the whole surface with generic values. Relative paths resolve
# against the project root (not your shell's cwd). A matching env var (see
# .env.example) overrides the value here where the two overlap.

# ── Who lives here ────────────────────────────────────────────────────────────
identity:
  companion_name: "Echo"          # the companion's name (env: COMPANION_NAME)
  user_name: "Alex"               # your name (env: USER_NAME)
  timezone: "Europe/London"       # IANA tz for schedules/timestamps (env: TZ)
  # Optional structured identity files, resolved from project root. Absent files
  # are simply skipped — the primary identity is agent.claude_md_path below.
  profile_path: "./identity/companion.profile.yaml"
  companion_md_path: "./identity/companion.md"

# ── HTTP server ───────────────────────────────────────────────────────────────
server:
  port: 3099                      # (env: PORT)
  host: "127.0.0.1"               # loopback by default (env: HOST)
  db_path: "./data/resonant.db"   # SQLite file, created on first boot (env: DB_PATH)

# ── Auth gate ─────────────────────────────────────────────────────────────────
auth:
  password: ""                    # empty = no password (loopback only). (env: APP_PASSWORD)

# ── The agent ─────────────────────────────────────────────────────────────────
agent:
  cwd: "."                        # the agent's home dir (env: AGENT_CWD)
  claude_md_path: "./CLAUDE.md"   # the primary identity/system file
  system_prompt_file: ""          # optional extra system-prompt file; "" = none
  mcp_json_path: "./.mcp.json"    # MCP servers the agent may call
  model: "claude-sonnet-4-6"          # interactive turns (env: AGENT_MODEL)
  model_autonomous: "claude-sonnet-4-6" # background/wake turns

# ── Orchestrator (autonomous wakes + failsafe) ────────────────────────────────
orchestrator:
  enabled: true
  wake_prompts_path: "./prompts/wake.md"   # the base wake prompt
  wake_prompts_dir: "./prompts/wakes"      # optional per-schedule wake prompts
  schedules: {}                            # name -> cron expr (croner). {} = none
  failsafe:
    enabled: false                # reach out if the user goes quiet too long
    gentle_minutes: 120
    concerned_minutes: 720
    emergency_minutes: 1440

# ── Daily handoff subagent (off by default; Settings toggle persists in DB) ────
handoff:
  enabled: false

# ── Agent write-gate (PreToolUse allowlist) ───────────────────────────────────
hooks:
  context_injection: true         # inject context (identity, cards, memory) each turn
  safe_write_prefixes: []         # extra path prefixes the agent may write to
  workspace_root: ""              # a root dir the agent may write within (env: WORKSPACE_ROOT)
  vault_path: ""                  # a notes/vault dir the agent may write within (env: VAULT_PATH)
  extra_write_paths: []           # extra dirs (prefix) or files (exact). (env: EXTRA_WRITE_PATHS)

# ── Voice (optional; keys live in .env, not here) ─────────────────────────────
voice:
  enabled: false
  elevenlabs_voice_id: ""         # (env: ELEVENLABS_VOICE_ID)

# ── Discord channel (optional; token in .env or Settings) ─────────────────────
discord:
  enabled: false
  owner_user_id: ""               # the Discord user the bot answers to

# ── Telegram channel (optional; token in .env or Settings) ────────────────────
telegram:
  enabled: false
  owner_chat_id: ""               # the Telegram chat the bot answers to

# ── External integrations ─────────────────────────────────────────────────────
integrations:
  life_api_url: ""                # optional Command Center / life-data API base URL
  mind_cloud:
    enabled: false                # the Mind memory service
    mcp_url: ""                   # its MCP endpoint (the api key is set in Settings, DB-stored)

# ── Google Workspace MCP (optional) ───────────────────────────────────────────
google:
  enabled: false                  # master gate for the /mcp/workspace mount
  client_id: ""                   # desktop OAuth client id (env: GOOGLE_CLIENT_ID)
  client_secret: ""               # desktop OAuth client secret (env: GOOGLE_CLIENT_SECRET)

# ── Command Center (care/day dashboard) ───────────────────────────────────────
command_center:
  enabled: false
  default_person: "user"          # whose care rows the page reads/writes
  currency_symbol: "$"
  care_categories:
    toggles: ["breakfast", "lunch", "dinner", "snacks", "medication", "movement", "shower"]
    ratings: ["sleep", "energy", "wellbeing", "mood"]
    counters:
      - name: "water"
        max: 10

# ── CORS ──────────────────────────────────────────────────────────────────────
cors:
  origins: []                     # allowed browser origins; [] = same-origin only

# NOTE: the Mind surface toggle (mind.enabled) and the Mind api key (mind.api_key)
# are managed from the in-app Settings UI and stored in the DB, not in this file.
